<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>屋主拜訪戰卡</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#A32D2D;
  --green:#639922;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-text:#3C3489;
  --orange:#BA7517;--orange-bg:#FAEEDA;--orange-text:#854F0B;
  --gray:#888780;--gray-bg:#F1EFE8;--gray-text:#444441;
  --bg:#F5F4F0;--card:#fff;--border:rgba(0,0,0,.10);
  --text:#2C2C2A;--text2:#5F5E5A;--radius:14px;--shadow:0 2px 8px rgba(0,0,0,.08)
}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);font-size:16px;min-height:100vh;-webkit-tap-highlight-color:transparent}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-orange{background:var(--orange-bg);color:var(--orange-text)}
.badge-gray{background:var(--gray-bg);color:var(--gray-text)}
#header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 14px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.header-top h1{font-size:19px;font-weight:700;flex:1}
.header-btns{display:flex;gap:6px}
#btn-add{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:15px;font-weight:600;cursor:pointer}
#btn-menu{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:16px;cursor:pointer}
.menu-wrap{position:relative}
.dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:170px;z-index:300;overflow:hidden}
.dropdown.open{display:block}
.di{display:block;width:100%;padding:12px 16px;font-size:14px;font-weight:500;color:var(--text);background:none;border:none;border-bottom:1px solid var(--bg);text-align:left;cursor:pointer}
.di:last-child{border-bottom:none}
.di:active{background:var(--bg)}
#search-box{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--bg);color:var(--text);outline:none;margin-bottom:8px}
#search-box:focus{border-color:var(--purple)}
.filter-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;flex-shrink:0}
.ftab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
#list-view{padding:10px 12px 80px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px;line-height:1.8}
.empty-state .big{font-size:48px;margin-bottom:10px}
.bcard{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;position:relative;transition:transform .1s}
.bcard:active{transform:scale(.985)}
.bcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.bcard-addr{font-size:16px;font-weight:700;flex:1;margin-right:8px;line-height:1.3}
.bcard-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:flex-start;flex-shrink:0}
.bcard-sub{font-size:14px;color:var(--text2);margin-bottom:5px}
.bcard-info{font-size:13px;color:var(--text2);background:var(--bg);border-radius:8px;padding:5px 9px;margin-bottom:5px}
.bcard-info strong{color:var(--text)}
.bcard-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.bcard-date{font-size:12px;color:var(--gray)}
.bcard-actions{display:flex;gap:6px}
.btn-icon{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.btn-quick{padding:6px 12px;border-radius:8px;background:var(--purple-bg);color:var(--purple-text);border:none;font-size:13px;font-weight:600;cursor:pointer}
.today-star{position:absolute;top:-1px;left:16px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:0 0 8px 8px}
.priority-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.priority-high .priority-bar{background:var(--red)}
.priority-mid .priority-bar{background:var(--orange)}
.priority-low .priority-bar{background:var(--gray)}
#detail-view{display:none;min-height:100vh}
#detail-header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px}
#detail-header h2{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-back{background:var(--bg);border:none;border-radius:10px;padding:7px 13px;font-size:14px;cursor:pointer;color:var(--text);flex-shrink:0}
.btn-field-mode{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
#detail-body{padding-bottom:60px}
.section{background:#fff;margin:10px 12px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.section-title{font-size:12px;font-weight:700;color:var(--text2);padding:9px 14px 5px;border-bottom:1px solid var(--bg);text-transform:uppercase;letter-spacing:.5px}
.field-row{display:flex;align-items:baseline;padding:9px 14px;border-bottom:1px solid var(--bg);gap:8px}
.field-row:last-child{border-bottom:none}
.field-label{font-size:12px;color:var(--text2);min-width:80px;flex-shrink:0}
.field-value{font-size:15px;color:var(--text);flex:1;line-height:1.5;word-break:break-all}
.field-value.big{font-size:16px;font-weight:600}
.script-box{margin:0 14px 10px;border-radius:10px;padding:11px 13px;border-left:3px solid var(--purple);background:var(--purple-bg)}
.script-label{font-size:11px;color:var(--purple-text);font-weight:700;margin-bottom:3px;text-transform:uppercase}
.script-text{font-size:15px;color:var(--text);line-height:1.6}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
.result-btn{padding:11px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;color:var(--text);cursor:pointer;text-align:center;line-height:1.3}
.result-btn.selected{border-color:var(--purple);background:var(--purple-bg);color:var(--purple-text)}
.note-area{margin:0 14px 10px;width:calc(100% - 28px);padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);resize:vertical;outline:none;min-height:64px}
.note-area:focus{border-color:var(--purple)}
.save-result-btn{margin:0 14px 6px;width:calc(100% - 28px);padding:13px;border-radius:12px;border:none;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.completion-bar-wrap{padding:4px 14px 10px;display:flex;align-items:center;gap:8px}
.completion-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.completion-fill{height:100%;background:var(--green);border-radius:3px}
.completion-pct{font-size:12px;color:var(--green-text);font-weight:600;min-width:28px}
#quick-view{display:none;min-height:100vh;background:#1a1830}
#quick-header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
#quick-header h2{font-size:15px;color:rgba(255,255,255,.65);flex:1}
.btn-exit-quick{background:rgba(255,255,255,.12);border:none;border-radius:8px;padding:7px 13px;font-size:14px;color:#fff;cursor:pointer}
.quick-main{padding:18px 16px 140px}
.quick-addr{font-size:24px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:6px}
.quick-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px}
.quick-price{font-size:17px;color:#f9c74f;font-weight:700;margin-bottom:10px}
.quick-feature{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:14px;line-height:1.4}
.quick-divider{height:1px;background:rgba(255,255,255,.1);margin:14px 0}
.quick-label{font-size:11px;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.quick-script1{font-size:19px;color:#fff;font-weight:600;line-height:1.5;background:rgba(127,119,221,.25);border-radius:12px;padding:13px 15px;margin-bottom:10px;border-left:3px solid var(--purple)}
.quick-script2{font-size:16px;color:rgba(255,255,255,.85);line-height:1.5;background:rgba(255,255,255,.07);border-radius:12px;padding:11px 13px;margin-bottom:14px}
.quick-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.quick-tag{padding:5px 13px;border-radius:20px;font-size:13px;font-weight:600}
.qtag-goal{background:rgba(99,153,34,.25);color:#a8d970}
.qtag-type{background:rgba(127,119,221,.3);color:#c8c5f8}
.quick-result-bar{position:fixed;bottom:0;left:0;right:0;background:#13112a;padding:10px 14px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:6px;flex-wrap:wrap}
.qr-btn{flex:1;min-width:70px;padding:10px 4px;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.qr-btn.sel{background:rgba(99,153,34,.3);border-color:#639922;color:#a8d970}
#modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);overflow-y:auto}
#modal-bg.show{display:block}
#modal{background:#fff;margin:0 auto;max-width:560px;min-height:100vh;padding-bottom:40px}
#modal-header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;z-index:10}
#modal-header h3{font-size:17px;font-weight:700}
.modal-actions{display:flex;gap:8px}
.btn-cancel{padding:8px 14px;border-radius:10px;background:var(--bg);border:none;font-size:14px;cursor:pointer;color:var(--text)}
.btn-save{padding:8px 14px;border-radius:10px;background:var(--purple);border:none;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.form-section{padding:13px 15px 2px}
.form-section h4{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--bg)}
.form-group{margin-bottom:11px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--purple)}
.form-group textarea{resize:vertical;min-height:58px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.priority-btns{display:flex;gap:6px}
.pbtn{flex:1;padding:9px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;cursor:pointer;text-align:center;color:var(--text)}
.pbtn.active-high{background:var(--red-bg);border-color:var(--red);color:var(--red-text);font-weight:700}
.pbtn.active-mid{background:var(--orange-bg);border-color:var(--orange);color:var(--orange-text);font-weight:700}
.pbtn.active-low{background:var(--gray-bg);border-color:var(--gray);color:var(--gray-text);font-weight:700}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#import-file{display:none}
@media(min-width:600px){
  #list-view{max-width:640px;margin:0 auto;padding:12px 16px 80px}
  #detail-view,#quick-view{max-width:640px;margin:0 auto}
  .result-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div id="list-view">
  <div id="header">
    <div class="header-top">
      <h1>🏠 拜訪戰卡</h1>
      <div class="header-btns">
        <button id="btn-add" onclick="openModal()">＋ 新增</button>
        <div class="menu-wrap">
          <button id="btn-menu" onclick="toggleMenu()">☰</button>
          <div class="dropdown" id="main-menu">
            <button class="di" onclick="exportJSON()">📤 匯出備份 JSON</button>
            <button class="di" onclick="document.getElementById('import-file').click()">📥 匯入備份 JSON</button>
            <button class="di" onclick="markTodayAll()">📅 全部設為今日</button>
            <button class="di" onclick="clearAll()" style="color:var(--red-text)">🗑️ 清除所有資料</button>
          </div>
        </div>
      </div>
    </div>
    <input id="search-box" type="search" placeholder="搜尋地址或屋主…" oninput="renderList()"/>
    <div class="filter-tabs">
      <button class="ftab active" onclick="setFilter('all',this)">全部</button>
      <button class="ftab" onclick="setFilter('today',this)">📅 今日</button>
      <button class="ftab" onclick="setFilter('unvisited',this)">未拜訪</button>
      <button class="ftab" onclick="setFilter('high',this)">🔴 高優先</button>
      <button class="ftab" onclick="setFilter('followup',this)">追蹤中</button>
    </div>
  </div>
  <div id="card-container"></div>
</div>
<input type="file" id="import-file" accept=".json" onchange="importJSON(event)">

<div id="detail-view">
  <div id="detail-header">
    <button class="btn-back" onclick="showList()">← 返回</button>
    <h2 id="detail-title"></h2>
    <button class="btn-field-mode" onclick="showQuick()">現場模式</button>
  </div>
  <div id="detail-body"></div>
</div>

<div id="quick-view">
  <div id="quick-header">
    <button class="btn-exit-quick" onclick="showDetail()">← 離開</button>
    <h2>現場快速模式</h2>
  </div>
  <div id="quick-body"></div>
</div>

<div id="modal-bg">
  <div id="modal">
    <div id="modal-header">
      <h3 id="modal-title">新增戰卡</h3>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" onclick="saveCard()">儲存</button>
      </div>
    </div>
    <div id="modal-form"></div>
  </div>
</div>
<div id="toast"></div>

<script>
var SK='battle_cards_v1';
var cards=[],currentFilter='all',currentCardId=null,editPriority='low';

function loadData(){try{var r=localStorage.getItem(SK);cards=r?JSON.parse(r):[]}catch(e){cards=[]}}
function saveData(){localStorage.setItem(SK,JSON.stringify(cards))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function v(x){return x||''}

var SL={unvisited:'未拜訪',visited:'已拜訪',followup:'待追蹤'};
var SC={unvisited:'badge-red',visited:'badge-green',followup:'badge-orange'};
var OTL={urgent:'急售型',observing:'觀望型',defensive:'防備型'};
var PL={high:'高',mid:'中',low:'低'};
var RESULTS=['沒遇到人','有遇到但拒絕','願意聊天','留下聯絡方式','約下次時間','有賣意願'];
var SMAP={沒遇到人:'unvisited',有遇到但拒絕:'visited',願意聊天:'visited',留下聯絡方式:'followup',約下次時間:'followup',有賣意願:'followup'};

function pct(c){
  var f=[c.addr,c.owner,c.type,c.script1,c.script2,c.minGoal,c.ownerType,c.reasons];
  return Math.round(f.filter(function(x){return x&&x.trim()}).length/f.length*100);
}
function isToday(d){return d&&d===new Date().toISOString().split('T')[0]}
function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── 選單
function toggleMenu(){
  var m=document.getElementById('main-menu');
  m.classList.toggle('open');
}
document.addEventListener('click',function(e){
  if(!e.target.closest('#btn-menu')&&!e.target.closest('#main-menu')){
    var m=document.getElementById('main-menu');if(m)m.classList.remove('open');
  }
});

// ── 匯出
function exportJSON(){
  var blob=new Blob([JSON.stringify(cards,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='battle_cards_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('📤 已匯出 '+cards.length+' 筆資料');
  document.getElementById('main-menu').classList.remove('open');
}

// ── 匯入
function importJSON(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var imported=JSON.parse(ev.target.result);
      if(!Array.isArray(imported))throw new Error('格式不正確');
      var ids=new Set(cards.map(function(c){return c.id}));
      var nc=imported.filter(function(c){return !ids.has(c.id)});
      cards=cards.concat(nc);
      saveData();renderList();
      showToast('📥 已匯入 '+nc.length+' 筆新資料');
    }catch(err){showToast('❌ 匯入失敗：'+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
  document.getElementById('main-menu').classList.remove('open');
}

// ── 全部設今日
function markTodayAll(){
  var today=new Date().toISOString().split('T')[0];
  cards.forEach(function(c){c.visitDate=today});
  saveData();renderList();showToast('📅 已設定全部為今日');
  document.getElementById('main-menu').classList.remove('open');
}

// ── 清除全部（自訂確認框）
function clearAll(){
  if(!cards.length){showToast('沒有資料可清除');return;}
  var el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  el.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;max-width:300px;width:100%;text-align:center">'
    +'<div style="font-size:15px;font-weight:600;margin-bottom:20px;line-height:1.5">確定要清除所有 '+cards.length+' 筆戰卡嗎？</div>'
    +'<div style="display:flex;gap:10px">'
    +'<button id="cf-n" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid #ddd;background:#f5f4f0;font-size:14px;cursor:pointer">取消</button>'
    +'<button id="cf-y" style="flex:1;padding:12px;border-radius:10px;border:none;background:#E24B4A;color:#fff;font-size:14px;font-weight:600;cursor:pointer">確定</button>'
    +'</div></div>';
  document.body.appendChild(el);
  el.querySelector('#cf-n').onclick=function(){el.remove();};
  el.querySelector('#cf-y').onclick=function(){el.remove();cards=[];saveData();renderList();showToast('🗑️ 已清除所有資料');};
  document.getElementById('main-menu').classList.remove('open');
}

// ── 篩選
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');renderList();
}
function getFiltered(){
  var q=(document.getElementById('search-box').value||'').trim().toLowerCase();
  return cards.filter(function(c){
    if(q&&!(v(c.addr).toLowerCase().includes(q)||v(c.owner).toLowerCase().includes(q)))return false;
    if(currentFilter==='today')return isToday(c.visitDate);
    if(currentFilter==='unvisited')return c.status==='unvisited';
    if(currentFilter==='high')return c.priority==='high';
    if(currentFilter==='followup')return c.status==='followup';
    return true;
  });
}

// ── 列表渲染
function renderList(){
  var el=document.getElementById('card-container');
  var list=getFiltered();
  if(!list.length){
    el.innerHTML='<div class="empty-state"><div class="big">📋</div>沒有符合的戰卡<br><small>點右上角「新增」開始</small></div>';
    return;
  }
  var pO={high:0,mid:1,low:2};
  list.sort(function(a,b){
    var at=isToday(a.visitDate)?0:1,bt=isToday(b.visitDate)?0:1;
    if(at!==bt)return at-bt;
    return (pO[a.priority]||2)-(pO[b.priority]||2);
  });
  el.innerHTML=list.map(function(c){
    var p=pct(c);
    var warn=p<70?'<span style="font-size:11px;color:#854F0B;font-weight:600">⚠ 資料不完整</span>':'';
    var todayTag=isToday(c.visitDate)?'<div class="today-star">今日</div>':'';
    var st='<span class="badge '+(SC[c.status]||'badge-gray')+'">'+(SL[c.status]||'')+'</span>';
    var priceRow=c.price?'<div class="bcard-info" style="color:#A32D2D"><strong>售價：</strong>'+esc(c.price)+(c.layout?' ・ '+esc(c.layout):'')+'</div>':'';
    var oaRow=c.ownerAddr?'<div class="bcard-info" style="color:#3C3489"><strong>現居：</strong>'+esc(c.ownerAddr)+'</div>':'';
    var featRow=c.feature?'<div class="bcard-info"><strong>特徵：</strong>'+esc(c.feature)+'</div>':'';
    return '<div class="bcard priority-'+(c.priority||'low')+'" onclick="showDetail(\''+c.id+'\')">'
      +'<div class="priority-bar"></div>'+todayTag
      +'<div class="bcard-top" style="margin-top:'+(isToday(c.visitDate)?'14px':'0')+'">'
        +'<div class="bcard-addr">'+(c.addr||'（未填地址）')+'</div>'
        +'<div class="bcard-meta">'+st+'</div>'
      +'</div>'
      +'<div class="bcard-sub">👤 '+(c.owner||'（未填屋主）')+(OTL[c.ownerType]?' · '+OTL[c.ownerType]:'')+'  '+warn+'</div>'
      +oaRow+priceRow+featRow
      +'<div class="bcard-info"><strong>目標：</strong>'+(c.minGoal||'（未設定）')+'</div>'
      +'<div class="bcard-bottom">'
        +'<div class="bcard-date">'+(c.visitDate?'📅 '+c.visitDate:'未設定日期')+'</div>'
        +'<div class="bcard-actions">'
          +'<button class="btn-icon" onclick="event.stopPropagation();openModal(\''+c.id+'\')">✏️</button>'
          +'<button class="btn-icon" onclick="event.stopPropagation();deleteCard(\''+c.id+'\')">🗑️</button>'
          +'<button class="btn-quick" onclick="event.stopPropagation();showQuickById(\''+c.id+'\')">現場</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

// ── 詳情頁
function showDetail(id){
  if(id)currentCardId=id;
  var c=cards.find(function(x){return x.id===currentCardId});if(!c)return;
  document.getElementById('list-view').style.display='none';
  document.getElementById('quick-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('detail-title').textContent=c.addr||'（未填地址）';
  var p=pct(c);
  var html='<div class="section" style="margin-top:10px"><div class="section-title">完成度</div>'
    +'<div class="completion-bar-wrap">'
    +'<div class="completion-bar"><div class="completion-fill" style="width:'+p+'%"></div></div>'
    +'<div class="completion-pct">'+p+'%</div>'
    +'<span class="badge '+(SC[c.status]||'badge-gray')+'">'+(SL[c.status]||'')+'</span>'
    +'</div></div>'
    +'<div class="section"><div class="section-title">基本資訊</div>'
    +'<div class="field-row"><div class="field-label">出售地址</div><div class="field-value big">'+(c.addr||'—')+'</div></div>';
  if(c.ownerAddr)html+='<div class="field-row"><div class="field-label" style="color:var(--purple-text)">屋主現居</div><div class="field-value" style="color:var(--purple-text);font-weight:600">'+esc(c.ownerAddr)+'</div></div>';
  if(c.price)html+='<div class="field-row"><div class="field-label">售價</div><div class="field-value big" style="color:var(--red-text)">'+esc(c.price)+'</div></div>';
  if(c.layout)html+='<div class="field-row"><div class="field-label">格局</div><div class="field-value">'+esc(c.layout)+'</div></div>';
  if(c.building)html+='<div class="field-row"><div class="field-label">社區/大樓</div><div class="field-value">'+esc(c.building)+'</div></div>';
  if(c.feature)html+='<div class="field-row"><div class="field-label">辨識特徵</div><div class="field-value">'+esc(c.feature)+'</div></div>';
  html+='<div class="field-row"><div class="field-label">屋主稱呼</div><div class="field-value big">'+(c.owner||'—')+'</div></div>';
  if(c.contact)html+='<div class="field-row"><div class="field-label">聯絡方式</div><div class="field-value"><a href="tel:'+esc(c.contact)+'" style="color:var(--purple)">'+esc(c.contact)+'</a></div></div>';
  html+='<div class="field-row"><div class="field-label">物件類型</div><div class="field-value">'+(c.type||'—')+'</div></div>'
    +'<div class="field-row"><div class="field-label">屋主類型</div><div class="field-value">'+(OTL[c.ownerType]||'—')+'</div></div>'
    +'<div class="field-row"><div class="field-label">拜訪日期</div><div class="field-value">'+(c.visitDate||'未設定')+'</div></div>'
    +'<div class="field-row"><div class="field-label">優先順序</div><div class="field-value">'+(PL[c.priority]||'—')+'</div></div>'
    +'</div>'
    +'<div class="section"><div class="section-title">委託策略</div>';
  if(c.reasons)html+='<div class="field-row"><div class="field-label">委託理由</div><div class="field-value">'+esc(c.reasons)+'</div></div>';
  html+='<div class="field-row"><div class="field-label">本次目標</div><div class="field-value big" style="color:var(--purple-text)">'+(c.minGoal||'—')+'</div></div></div>'
    +'<div class="section"><div class="section-title">開場話術</div><div style="padding:10px 0 2px">'
    +'<div class="script-box"><div class="script-label">第一句開場</div><div class="script-text">'+(c.script1||'（未填）')+'</div></div>';
  if(c.script2)html+='<div class="script-box" style="background:var(--green-bg);border-left-color:var(--green)"><div class="script-label" style="color:var(--green-text)">第二句追問</div><div class="script-text">'+esc(c.script2)+'</div></div>';
  html+='</div></div>'
    +'<div class="section"><div class="section-title">拜訪結果紀錄</div>'
    +'<div class="result-grid">'+RESULTS.map(function(r){return '<button class="result-btn'+(c.visitResult===r?' selected':'')+'" onclick="selectResult(\''+r+'\')">'+r+'</button>'}).join('')+'</div>'
    +'<textarea class="note-area" id="note-input" placeholder="補充備註…">'+(c.note||'')+'</textarea>'
    +'<textarea class="note-area" id="followup-input" placeholder="下次跟進重點…">'+(c.followup||'')+'</textarea>'
    +'<button class="save-result-btn" onclick="saveVisitResult()">✅ 儲存拜訪結果</button></div>'
    +'<div style="padding:4px 12px 10px"><button style="width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:14px;cursor:pointer;color:var(--text)" onclick="openModal(\''+c.id+'\')">✏️ 編輯完整資料</button></div>';
  document.getElementById('detail-body').innerHTML=html;
  window._selResult=c.visitResult||'';
}

function selectResult(r){
  window._selResult=r;
  document.querySelectorAll('.result-btn').forEach(function(b){b.classList.toggle('selected',b.textContent===r)});
  var c=cards.find(function(x){return x.id===currentCardId});
  if(c&&SMAP[r])c.status=SMAP[r];
}
function saveVisitResult(){
  var c=cards.find(function(x){return x.id===currentCardId});if(!c)return;
  c.visitResult=window._selResult||'';
  c.note=document.getElementById('note-input').value;
  c.followup=document.getElementById('followup-input').value;
  if(['留下聯絡方式','約下次時間','有賣意願'].includes(c.visitResult))c.status='followup';
  else if(c.visitResult&&c.visitResult!=='沒遇到人')c.status='visited';
  c.updatedAt=new Date().toISOString();
  saveData();showToast('✅ 已儲存拜訪結果');showDetail();
}
function showList(){
  document.getElementById('detail-view').style.display='none';
  document.getElementById('quick-view').style.display='none';
  document.getElementById('list-view').style.display='block';
  renderList();
}

// ── 快速模式
function showQuickById(id){currentCardId=id;showQuick();}
function showQuick(){
  var c=cards.find(function(x){return x.id===currentCardId});if(!c)return;
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').style.display='none';
  document.getElementById('quick-view').style.display='block';
  window._selResult=c.visitResult||'';
  var html='<div class="quick-main">'
    +'<div class="quick-addr">'+(c.addr||'（未填地址）')+'</div>';
  if(c.ownerAddr)html+='<div class="quick-sub">🚪 現居：'+esc(c.ownerAddr)+'</div>';
  if(c.price)html+='<div class="quick-price">💰 '+esc(c.price)+(c.layout?' ・ '+esc(c.layout):'')+'</div>';
  html+='<div class="quick-feature">'+(c.feature||c.building||'（無辨識特徵）')+'</div>'
    +'<div class="quick-tags">'
    +'<span class="quick-tag qtag-type">👤 '+(c.owner||'屋主')+' · '+(OTL[c.ownerType]||'未知')+'</span>'
    +'<span class="quick-tag qtag-goal">🎯 '+(c.minGoal||'未設定')+'</span>'
    +'</div>'
    +'<div class="quick-divider"></div>'
    +'<div class="quick-label">第一句開場</div>'
    +'<div class="quick-script1">'+(c.script1||'（未填開場句）')+'</div>';
  if(c.script2)html+='<div class="quick-label">第二句追問</div><div class="quick-script2">'+esc(c.script2)+'</div>';
  html+='</div>'
    +'<div class="quick-result-bar">'+RESULTS.map(function(r){return '<button class="qr-btn'+(c.visitResult===r?' sel':'')+'" onclick="qrSelect(\''+r+'\')">'+r+'</button>'}).join('')+'</div>';
  document.getElementById('quick-body').innerHTML=html;
}
function qrSelect(r){
  window._selResult=r;
  document.querySelectorAll('.qr-btn').forEach(function(b){b.classList.toggle('sel',b.textContent===r)});
  var c=cards.find(function(x){return x.id===currentCardId});if(!c)return;
  c.visitResult=r;if(SMAP[r])c.status=SMAP[r];
  c.updatedAt=new Date().toISOString();
  saveData();showToast('✅ 記錄：'+r);
}

// ── Modal 表單
function openModal(id){
  var c=id?cards.find(function(x){return x.id===id}):null;
  document.getElementById('modal-title').textContent=c?'編輯戰卡':'新增戰卡';
  currentCardId=c?c.id:null;
  editPriority=c?(c.priority||'low'):'low';

  var a=c?v(c.addr):'', oa=c?v(c.ownerAddr):'', pr=c?v(c.price):'', ly=c?v(c.layout):'';
  var bl=c?v(c.building):'', ft=c?v(c.feature):'', ow=c?v(c.owner):'', tel=c?v(c.contact):'';
  var ot=c?v(c.ownerType):'', dt=c?v(c.visitDate):'', pv=c?(c.priority||'low'):'low';
  var gl=c?v(c.minGoal):'', st=c?(c.status||'unvisited'):'unvisited';
  var rs=c?v(c.reasons):'', s1=c?v(c.script1):'', s2=c?v(c.script2):'', ty=c?(c.type||'大樓'):'大樓';

  var typeOpts=['大樓','公寓','透天/公寓','透天','店面','其他'].map(function(t){return '<option'+(t===ty?' selected':'')+'>'+t+'</option>'}).join('');
  var goalOpts=['講上話','留聯絡','約時間','試探賣意願','請託委託'].map(function(g){return '<option'+(g===gl?' selected':'')+'>'+g+'</option>'}).join('');

  document.getElementById('modal-form').innerHTML=
    '<div class="form-section"><h4>📍 基本資訊</h4>'
   +'<div class="form-group"><label>🏠 出售物件地址 *</label><input id="f-addr" type="text" placeholder="例：大安區和平東路一段56號4樓" value="'+esc(a)+'"></div>'
   +'<div class="form-group"><label>🚪 屋主現居地址</label><input id="f-owner-addr" type="text" placeholder="例：信義區松仁路100號3樓" value="'+esc(oa)+'"></div>'
   +'<div class="form-row">'
   +'<div class="form-group"><label>💰 房屋售價</label><input id="f-price" type="text" placeholder="例：1280萬" value="'+esc(pr)+'"></div>'
   +'<div class="form-group"><label>🏗️ 物件格局</label><input id="f-layout" type="text" placeholder="例：3房2廳2衛" value="'+esc(ly)+'"></div>'
   +'</div>'
   +'<div class="form-row">'
   +'<div class="form-group"><label>社區/大樓</label><input id="f-building" type="text" placeholder="例：和平大廈" value="'+esc(bl)+'"></div>'
   +'<div class="form-group"><label>物件類型</label><select id="f-type">'+typeOpts+'</select></div>'
   +'</div>'
   +'<div class="form-group"><label>辨識特徵</label><input id="f-feature" type="text" placeholder="例：頂樓加蓋、鐵窗" value="'+esc(ft)+'"></div>'
   +'</div>'
   +'<div class="form-section"><h4>👤 屋主資訊</h4>'
   +'<div class="form-row">'
   +'<div class="form-group"><label>屋主稱呼 *</label><input id="f-owner" type="text" placeholder="例：陳大哥" value="'+esc(ow)+'"></div>'
   +'<div class="form-group"><label>聯絡方式</label><input id="f-contact" type="tel" placeholder="0912-345-678" value="'+esc(tel)+'"></div>'
   +'</div>'
   +'<div class="form-group"><label>屋主類型</label><select id="f-ownerType">'
   +'<option value="">請選擇</option>'
   +'<option value="urgent"'+(ot==='urgent'?' selected':'')+'>急售型</option>'
   +'<option value="observing"'+(ot==='observing'?' selected':'')+'>觀望型</option>'
   +'<option value="defensive"'+(ot==='defensive'?' selected':'')+'>防備型</option>'
   +'</select></div>'
   +'</div>'
   +'<div class="form-section"><h4>🎯 拜訪計畫</h4>'
   +'<div class="form-row">'
   +'<div class="form-group"><label>拜訪日期</label><input id="f-date" type="date" value="'+dt+'"></div>'
   +'<div class="form-group"><label>優先順序</label><div class="priority-btns">'
   +'<button class="pbtn'+(pv==='high'?' active-high':'')+'" id="pb-high" onclick="setPri(\'high\')">🔴 高</button>'
   +'<button class="pbtn'+(pv==='mid'?' active-mid':'')+'" id="pb-mid" onclick="setPri(\'mid\')">🟡 中</button>'
   +'<button class="pbtn'+(pv==='low'?' active-low':'')+'" id="pb-low" onclick="setPri(\'low\')">⚪ 低</button>'
   +'</div></div></div>'
   +'<div class="form-group"><label>本次最小成功目標 *</label><select id="f-minGoal"><option value="">請選擇</option>'+goalOpts+'</select></div>'
   +'<div class="form-group"><label>狀態</label><select id="f-status">'
   +'<option value="unvisited"'+(st==='unvisited'?' selected':'')+'>未拜訪</option>'
   +'<option value="visited"'+(st==='visited'?' selected':'')+'>已拜訪</option>'
   +'<option value="followup"'+(st==='followup'?' selected':'')+'>待追蹤</option>'
   +'</select></div>'
   +'</div>'
   +'<div class="form-section"><h4>💡 委託策略</h4>'
   +'<div class="form-group"><label>委託理由/賣點</label><textarea id="f-reasons" placeholder="例：持有20年，子女在外縣市">'+esc(rs)+'</textarea></div>'
   +'</div>'
   +'<div class="form-section"><h4>🗣️ 開場話術</h4>'
   +'<div class="form-group"><label>第一開場句</label><textarea id="f-script1" placeholder="見到屋主第一句說什麼">'+esc(s1)+'</textarea></div>'
   +'<div class="form-group"><label>第二追問句</label><textarea id="f-script2" placeholder="對方沒拒絕時，接著問什麼">'+esc(s2)+'</textarea></div>'
   +'</div>';

  document.getElementById('modal-bg').classList.add('show');
}

function setPri(p){
  editPriority=p;
  ['high','mid','low'].forEach(function(x){
    var b=document.getElementById('pb-'+x);
    if(b)b.className='pbtn'+(p===x?' active-'+x:'');
  });
}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');}
function saveCard(){
  var addr=(document.getElementById('f-addr').value||'').trim();
  var owner=(document.getElementById('f-owner').value||'').trim();
  if(!addr){showToast('⚠️ 請填寫地址');return;}
  if(!owner){showToast('⚠️ 請填寫屋主稱呼');return;}
  var now=new Date().toISOString();
  var c=cards.find(function(x){return x.id===currentCardId});
  var data={
    addr:addr, owner:owner,
    ownerAddr:(document.getElementById('f-owner-addr').value||'').trim(),
    price:(document.getElementById('f-price').value||'').trim(),
    layout:(document.getElementById('f-layout').value||'').trim(),
    building:(document.getElementById('f-building').value||'').trim(),
    feature:(document.getElementById('f-feature').value||'').trim(),
    contact:(document.getElementById('f-contact').value||'').trim(),
    type:document.getElementById('f-type').value,
    ownerType:document.getElementById('f-ownerType').value,
    visitDate:document.getElementById('f-date').value,
    priority:editPriority||'low',
    minGoal:document.getElementById('f-minGoal').value,
    status:document.getElementById('f-status').value,
    reasons:(document.getElementById('f-reasons').value||'').trim(),
    script1:(document.getElementById('f-script1').value||'').trim(),
    script2:(document.getElementById('f-script2').value||'').trim(),
    updatedAt:now
  };
  if(c){Object.assign(c,data);}
  else{cards.unshift(Object.assign({id:genId(),visitResult:'',note:'',followup:'',createdAt:now},data));}
  saveData();closeModal();renderList();showToast(c?'✅ 已更新':'✅ 新增成功');
}
function deleteCard(id){
  var el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  el.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;max-width:300px;width:100%;text-align:center">'
    +'<div style="font-size:15px;font-weight:600;margin-bottom:20px">確定刪除這張戰卡？</div>'
    +'<div style="display:flex;gap:10px">'
    +'<button id="dn" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid #ddd;background:#f5f4f0;font-size:14px;cursor:pointer">取消</button>'
    +'<button id="dy" style="flex:1;padding:12px;border-radius:10px;border:none;background:#E24B4A;color:#fff;font-size:14px;font-weight:600;cursor:pointer">刪除</button>'
    +'</div></div>';
  document.body.appendChild(el);
  el.querySelector('#dn').onclick=function(){el.remove();};
  el.querySelector('#dy').onclick=function(){
    el.remove();
    cards=cards.filter(function(c){return c.id!==id});
    saveData();renderList();showToast('🗑️ 已刪除');
  };
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2300);
}

loadData();
renderList();
</script>
</body>
</html>
